services:

  # ── Application database (Neon in prod; local postgres for dev) ───────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: interviewai
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d interviewai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── App Redis (sessions, rate limiting, socket presence) ──────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend API + Socket.IO ───────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://admin:secret@postgres:5432/interviewai?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      GROQ_API_KEY: ${GROQ_API_KEY}
      PISTON_URL: http://piston:2000
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      piston:
        condition: service_started

  # ── Frontend (Vite dev server / static build) ─────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_SOCKET_URL: http://localhost:3000
    depends_on:
      - backend

  # ── Piston code execution sandbox ─────────────────────────────────────────────
  # Works on cgroup v2 (unlike Judge0 1.13.x).
  # Language runtimes are installed on first use via the /packages endpoint;
  # see scripts/piston-bootstrap.sh.
  piston:
    image: ghcr.io/engineer-man/piston
    restart: unless-stopped
    privileged: true
    ports:
      - "2358:2000"
    volumes:
      - pistondata:/piston

volumes:
  pgdata:
  redisdata:
  pistondata:
